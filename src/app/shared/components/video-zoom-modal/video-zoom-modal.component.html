@if (updatedVideo) {
  <div class="modal-background" (click)="closeModal()">
    <div class="modal-content" (click)="preventClose($event)">
      <button class="close-button" type="button" (click)="closeModal()" aria-label="Fechar">
        <mat-icon>close</mat-icon>
      </button>
      
      <div class="video-player">
        <video controls autoplay>
          <source [src]="updatedVideo.url" type="video/mp4" />
        </video>
      </div>

      <div class="content">
        <h3 class="title">
          <app-editable-field
            [value]="updatedVideo.title"
            fieldType="text"
            [canEdit]="isAdmin"
            placeholder="Título"
            (save)="onFieldSave('title', $event)"
          ></app-editable-field>
        </h3>
        <p class="description">
          <app-editable-field
            [value]="updatedVideo.description"
            fieldType="textarea"
            [canEdit]="isAdmin"
            placeholder="Descrição"
            (save)="onFieldSave('description', $event)"
          ></app-editable-field>
        </p>

        <div class="recipe-box">
          <strong>Receita:</strong><br />
          <app-editable-field                                 
            [value]="updatedVideo.recipe"                     
            emptyText="Sem receita cadastrada."               
            fieldType="textarea"                              
            [canEdit]="isAdmin"                               
            placeholder="Receita"                             
            (save)="onFieldSave('recipe', $event)"            
          ></app-editable-field>                              
        </div>

        <ul class="nutrients">
          <li>
            <app-editable-field
              [value]="updatedVideo.protein"
              fieldType="number"
              [canEdit]="isAdmin"
              label="Proteínas"
              suffix="g"
              (save)="onFieldSave('protein', $event)"
            ></app-editable-field>
          </li>
          <li>
            <app-editable-field
              [value]="updatedVideo.carbs"
              fieldType="number"
              [canEdit]="isAdmin"
              label="Carboidratos"
              suffix="g"
              (save)="onFieldSave('carbs', $event)"
            ></app-editable-field>
          </li>
          <li>
            <app-editable-field
              [value]="updatedVideo.fat"
              fieldType="number"
              [canEdit]="isAdmin"
              label="Gorduras"
              suffix="g"
              (save)="onFieldSave('fat', $event)"
            ></app-editable-field>
          </li>
          <li>
            <app-editable-field
              [value]="updatedVideo.fiber"
              fieldType="number"
              [canEdit]="isAdmin"
              label="Fibras"
              suffix="g"
              (save)="onFieldSave('fiber', $event)"
            ></app-editable-field>
          </li>
          <li>
            <app-editable-field
              [value]="updatedVideo.calories"                 
              fieldType="number"                              
              [canEdit]="isAdmin"                             
              label="Calorias"                                
              suffix=" kcal"                                  
              (save)="onFieldSave('calories', $event)"        
            ></app-editable-field>                            
          </li>                                               
        </ul>

        <app-comments-box
          [commentItems]="commentItems"
          [canDeleteComments]="isAdmin"
          [favorited]="updatedVideo.favorited"
          (favoriteClick)="toggleFavorite()"
          (commentSubmit)="addComment($event)"
          (commentDelete)="askDeleteComment($event)"
        ></app-comments-box>
      </div>
    </div>
  </div>

  <app-confirmation-modal
    [open]="isDeleteCommentModalOpen"
    title="Deletar comentário"
    message="Deseja mesmo deletar este comentário?"
    confirmText="Excluir"
    cancelText="Cancelar"
    [isDanger]="true"
    (confirm)="confirmDeleteComment()"
    (cancel)="cancelDeleteComment()"
  ></app-confirmation-modal>
}
