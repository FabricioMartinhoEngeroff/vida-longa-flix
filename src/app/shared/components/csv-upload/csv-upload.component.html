<div class="csv-upload-section">
  <h3 class="csv-title">Importação via CSV</h3>

  <!-- eslint-disable-next-line @angular-eslint/template/label-has-associated-control -->
  <label class="csv-upload-area"
    [class.drag-active]="isDragging"
    [class.file-selected]="fileName"
    [class.disabled]="uploading"
    (dragover)="onDragOver($event)"
    (dragenter)="onDragEnter()"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)">

    @if (!uploading) {
      <input type="file" accept=".csv" (change)="onFileSelect($event)" [disabled]="uploading" />
    }

    <span class="csv-upload-icon">
      @if (uploading) {
        <mat-icon class="csv-spinner">sync</mat-icon>
      } @else {
        <mat-icon>{{ fileName ? 'check_circle' : 'cloud_upload' }}</mat-icon>
      }
    </span>

    <span class="csv-upload-text">
      @if (uploading) {
        Importando... ({{ elapsedSeconds }}s)
      } @else if (fileName) {
        {{ fileName }}
      } @else {
        Arraste e solte o arquivo CSV aqui ou clique para selecionar
      }
    </span>

    @if (fileName && !uploading) {
      <button type="button" class="csv-clear-btn" (click)="clearFile(); $event.preventDefault()">
        <mat-icon>close</mat-icon>
      </button>
    }
  </label>

  @if (fileName && !uploading) {
    <button type="button" class="csv-import-btn" (click)="importCsv()">Importar</button>
  }

  @if (logs.length > 0) {
    <div class="csv-log-panel">
      <div class="csv-log-header">
        <mat-icon>terminal</mat-icon>
        <span>Log de importação</span>
      </div>
      <div class="csv-log-entries">
        @for (entry of logs; track $index) {
          <div class="csv-log-entry">{{ entry }}</div>
        }
      </div>
    </div>
  }

  @if (errors.length > 0) {
    <div class="csv-error-list">
      @for (err of errors; track $index) {
        <div class="csv-error-item">{{ err }}</div>
      }
    </div>
  }
</div>
