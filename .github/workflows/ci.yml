name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Security audit (production deps only)
        run: npm audit --audit-level=high --omit=dev

      - name: Trivy — scan de vulnerabilidades (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          format: table
          exit-code: '0'

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CI: true
        run: npm test

      - name: Build
        run: npm run build
